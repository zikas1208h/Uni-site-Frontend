<!DOCTYPE html>
<html>
<head>
    <title>HNU Logo Placeholder</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            margin: 0;
        }
        .logo-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .logo-text {
            font-size: 72px;
            font-weight: 900;
            color: white;
            letter-spacing: 8px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin: 20px 0 10px;
            font-size: 32px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }
        .instruction {
            margin-top: 30px;
            padding: 20px;
            background: #f0f3ff;
            border-radius: 10px;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">
            <div class="logo-text">HNU</div>
        </div>
        <h1>HNU Portal Logo</h1>
        <p>This is a placeholder. Replace with your actual HNU logo by saving it as:</p>
        <div class="instruction">
            frontend/public/logo.png
        </div>
        <p style="margin-top: 20px; font-size: 14px; color: #999;">
            Recommended size: 400x400px PNG with transparent background
        </p>
    </div>

    <script>
        // This page shows you what the logo placeholder looks like
        // To create an actual logo image from this:
        // 1. Take a screenshot of the logo square above
        // 2. Crop it to just the purple square with "HNU"
        // 3. Save as logo.png in frontend/public/ folder
        // 4. Or use your own HNU logo design
    </script>
</body>
</html>
